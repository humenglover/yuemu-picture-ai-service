# Tavily搜索工具配置
# 注意：api_key 已迁移到环境变量 TAVILY_API_KEY，请勿在此处填写真实密钥
tavily:
  search_depth: advanced
  max_results_default: 5

# Pexels图片抓取工具配置
# 注意：api_key 已迁移到环境变量 PEXELS_API_KEY，请勿在此处填写真实密钥
pexels:
  base_url: "https://api.pexels.com/v1"
  default_per_page: 10  # 默认每次搜索返回的图片数量
  max_per_page: 15  # 最大每次搜索返回的图片数量

# 悦木图库配置
yuemu:
  website_url: "https://www.yuemutuku.com"  # 网站域名（用于防盗链 Referer）
  cdn_domain: "static.yuemutuku.com"  # CDN 域名

# 腾讯云配置 (用于 TTS 等)
# 注意：secret_id 和 secret_key 已迁移到环境变量 TENCENTCLOUD_SECRET_ID / TENCENTCLOUD_SECRET_KEY
tencentcloud:
  # secret_id 和 secret_key 请通过环境变量设置